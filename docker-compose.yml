version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assetflow-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-assetflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-assetflow_secure_password_change_this}
      POSTGRES_DB: ${DB_NAME:-assetflow}
      POSTGRES_INITDB_ARGS: "-c log_statement=all"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - assetflow_postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - assetflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-assetflow_user} -d ${DB_NAME:-assetflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: assetflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@assetflow.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - assetflow-network
    profiles:
      - dev

volumes:
  assetflow_postgres_data:

networks:
  assetflow-network:
    driver: bridge
